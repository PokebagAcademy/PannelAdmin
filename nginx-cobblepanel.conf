# /etc/nginx/sites-available/cobblepanel
# Reverse proxy for the Cobblepanel app running on 127.0.0.1:3000.
# Replace YOUR-DOMAIN.duckdns.org with your actual domain before enabling.

# HTTP → HTTPS redirect (also serves ACME challenges for cert renewal)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR-DOMAIN.duckdns.org;

    # Let certbot keep this directory readable for renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — the actual app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR-DOMAIN.duckdns.org;

    # Certbot will fill these in after the first cert issuance.
    # Until then, run nginx with HTTP-only, get the cert, uncomment these.
    ssl_certificate     /etc/letsencrypt/live/YOUR-DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR-DOMAIN.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Allow large uploads (mods, world backups) — must match
    # serverActions.bodySizeLimit in next.config.js (200MB).
    client_max_body_size 220m;

    # Long-running connections (SFTP-tail polling, file uploads, MCP SSE)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Standard proxy headers Auth.js relies on (AUTH_TRUST_HOST=true)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # The MCP SSE endpoint — disable buffering so events flow promptly.
    location /api/mcp {
        proxy_pass http://127.0.0.1:3000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Same for any other SSE/streaming routes
    location ~ ^/api/sftp/[^/]+/tail$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_buffering off;
        proxy_cache off;
    }

    # Basic security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
